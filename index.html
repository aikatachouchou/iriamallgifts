<style>
:root{
  --main-pink:#ffb7c5;
  --sub-pink:#ff8fb1;
  --bg:#fffaf0;
  --card:#ffffff;
  --border:#ffecb3;
  --text:#7d5a50;
}

body{
  margin:0;
  font-family:'Kiwi Maru',serif;
  background:var(--bg);
  text-align:center;
  padding:10px;
  color:var(--text);
}

h1{
  color:var(--sub-pink);
}

/* コントロール */
.controls{
  margin-bottom:10px;
}

button, select, input{
  padding:6px 10px;
  border-radius:12px;
  border:2px solid var(--border);
  background:white;
  margin:3px;
  cursor:pointer;
  box-shadow:0 3px 0 var(--border);
}

button:active{
  transform:translateY(2px);
  box-shadow:0 1px 0 var(--border);
}

/* タブ */
.tabs button{
  font-weight:bold;
}

/* 白カード */
.table-container{
  background:var(--card);
  border-radius:20px;
  padding:12px;
  margin:10px auto;
  max-width:820px;
  border:4px solid var(--border);
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* グリッド */
.grid{
  display:grid;
  grid-template-columns: repeat(10, 72px);
  gap:8px;
  justify-content:center;
}

/* マス */
.cell{
  width:72px;
  height:72px;
  position:relative;
  border-radius:12px;
  overflow:hidden;
  background:white;
  border:2px solid #ffe4ec;
  cursor:pointer;
  transition:0.15s;
}

.cell:hover{
  transform:scale(1.05);
}

.cell img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* カウント */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
  color:white;
  font-size:20px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* クレジット */
.credit{
  margin-top:15px;
  font-size:14px;
  opacity:0.8;
  padding-bottom:20px;
}

.credit a{
  color:var(--sub-pink);
  text-decoration:none;
  font-weight:bold;
}

.credit a:hover{
  text-decoration:underline;
}

/* スマホ */
@media(max-width:800px){
  .grid{
    grid-template-columns: repeat(5, 72px);
  }
}
</style>
</head>

// =================
// 保存
// =================
function saveData(){
  const data = {
    state,
    undoStack,
    redoStack,
    filter,
    sort: document.getElementById("sort").value,
    search: document.getElementById("search").value
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// =================
// 読み込み
// =================
function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return;

  try{
    const data = JSON.parse(raw);
    state = data.state || {};
    undoStack = data.undoStack || [];
    redoStack = data.redoStack || [];
    filter = data.filter || "all";

    if(data.sort) document.getElementById("sort").value = data.sort;
    if(data.search) document.getElementById("search").value = data.search;

  }catch(e){
    console.error("データ読み込み失敗", e);
  }
}

// =================
// 初期化
// =================
function init(){
  items = files.map(f=>{
    let [name, point] = f.replace(".png","").split("_");
    return {
      file:f,
      name:name,
      point:Number(point)
    };
  });

  loadData();
  render();
}

// =================
// 描画
// =================
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  let list=[...items];

  // ソート
  if(document.getElementById("sort").value==="name"){
    list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  }else{
    list.sort((a,b)=>a.point-b.point);
  }

  // フィルタ
  list=list.filter(i=>{
    if(filter==="small") return i.point<=99;
    if(filter==="big") return i.point>=100;
    return true;
  });

  // 検索
  const kw=document.getElementById("search").value;
  if(kw){
    list=list.filter(i=>i.name.includes(kw));
  }

  list.forEach(item=>{
    const div=document.createElement("div");
    div.className="cell";

    const img=document.createElement("img");
    img.src="gifts/"+item.file;

    const overlay=document.createElement("div");
    overlay.className="overlay";

    const count=state[item.file]||0;
    if(count>0){
      overlay.innerText=count;
    }else{
      overlay.style.display="none";
    }

    // 左クリック
    div.onclick=()=>{
      saveUndo();
      state[item.file]=(state[item.file]||0)+1;
      render();
    };

    // 右クリック（減算）
    div.oncontextmenu=(e)=>{
      e.preventDefault();
      if((state[item.file]||0)>0){
        saveUndo();
        state[item.file]--;
        render();
      }
    };

    div.appendChild(img);
    div.appendChild(overlay);
    grid.appendChild(div);
  });

  saveData();
}

// =================
// Undo / Redo
// =================
function saveUndo(){
  undoStack.push(JSON.stringify(state));
  redoStack=[];
}

function undo(){
  if(!undoStack.length) return;
  redoStack.push(JSON.stringify(state));
  state=JSON.parse(undoStack.pop());
  render();
}

function redo(){
  if(!redoStack.length) return;
  undoStack.push(JSON.stringify(state));
  state=JSON.parse(redoStack.pop());
  render();
}

// =================
// リセット
// =================
function resetAll(){
  if(!confirm("全部リセットする？")) return;
  saveUndo();
  state={};
  render();
}

// =================
// フィルタ
// =================
function setFilter(f){
  filter=f;
  render();
}

// =================
init();
