<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全ギフたいきゅう！</title>

<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&display=swap" rel="stylesheet">

<style>
:root{
  --main-pink:#ffc1d6;
  --sub-pink:#ff6fa5;
  --bg:#fff0f6;
  --card:#ffffffcc;
  --border:#ffd6e7;
  --text:#8a4b67;
  --shadow:0 8px 20px rgba(255,111,165,0.15);
}

body{
  margin:0;
  font-family:'Kiwi Maru',serif;
  background:
    radial-gradient(circle at top left,#ffe3f0 0%,transparent 30%),
    radial-gradient(circle at bottom right,#ffd9ec 0%,transparent 30%),
    var(--bg);
  text-align:center;
  padding:15px;
  color:var(--text);
  min-height:100vh;
}

/* タイトル */
h1{
  color:var(--sub-pink);
  font-size:42px;
  margin-bottom:18px;
  text-shadow:
    0 2px 0 #fff,
    0 0 12px rgba(255,111,165,0.25);
}

/* コントロール */
.controls{
  margin-bottom:14px;
}

/* ボタン */
button,
select,
input{
  padding:8px 14px;
  border-radius:999px;
  border:none;
  background:linear-gradient(
    180deg,
    #fff,
    #ffe6f1
  );
  margin:4px;
  cursor:pointer;
  color:var(--text);
  font-weight:bold;
  font-family:'Kiwi Maru',serif;
  box-shadow:
    0 4px 10px rgba(255,111,165,0.18),
    inset 0 1px 0 #fff;
  transition:0.15s;
}

button:hover,
select:hover,
input:hover{
  transform:translateY(-2px) scale(1.03);
}

button:active{
  transform:translateY(1px);
}

/* 入力欄 */
input{
  width:220px;
  background:#fff;
}

/* タブ */
.tabs{
  margin-top:10px;
}

.tabs button.active{
  background:linear-gradient(
    180deg,
    #ff9bc2,
    #ff6fa5
  );
  color:white;
}

/* カード */
.table-container{
  background:var(--card);
  backdrop-filter:blur(10px);
  border-radius:28px;
  padding:18px;
  margin:14px auto;
  max-width:860px;
  border:3px solid white;
  box-shadow:var(--shadow);
}

/* グリッド */
.grid{
  display:grid;
  grid-template-columns: repeat(10, 74px);
  gap:10px;
  justify-content:center;
}

/* マス */
.cell{
  width:74px;
  height:74px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  background:white;
  border:2px solid #ffe1ee;
  cursor:pointer;
  transition:0.18s;
  box-shadow:
    0 4px 10px rgba(255,111,165,0.12);
}

.cell:hover{
  transform:
    translateY(-3px)
    scale(1.06);
}

.cell img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* カウント */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(255,111,165,0.55);
  color:white;
  font-size:24px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  text-shadow:0 2px 4px rgba(0,0,0,0.3);
  backdrop-filter:blur(2px);
}

/* モーダル */
.overlay-modal{
  position:fixed;
  inset:0;
  background:rgba(255,192,220,0.35);
  backdrop-filter:blur(5px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.modal-box{
  background:white;
  padding:28px;
  border-radius:28px;
  border:3px solid #ffd6e7;
  text-align:center;
  box-shadow:
    0 10px 30px rgba(255,111,165,0.2);
}

/* 進捗ボタン */
.progress-btn{
  background:linear-gradient(
    180deg,
    #ff9bc2,
    #ff6fa5
  );
  color:white;
  border-radius:999px;
  padding:10px 20px;
  font-size:16px;
}

/* クレジット */
.credit{
  margin-top:20px;
  font-size:14px;
  opacity:0.9;
  padding-bottom:20px;
}

.credit a{
  color:var(--sub-pink);
  text-decoration:none;
  font-weight:bold;
}

.credit a:hover{
  text-decoration:underline;
}

/* スマホ */
@media(max-width:800px){
  .grid{
    grid-template-columns: repeat(5, 74px);
  }

  h1{
    font-size:32px;
  }

  input{
    width:180px;
  }
}
</style>

// =================
// 保存
// =================
function saveData(){
  const data = {
    state,
    undoStack,
    redoStack,
    filter,
    sort: document.getElementById("sort").value,
    search: document.getElementById("search").value
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// =================
// 読み込み
// =================
function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return;

  try{
    const data = JSON.parse(raw);
    state = data.state || {};
    undoStack = data.undoStack || [];
    redoStack = data.redoStack || [];
    filter = data.filter || "all";

    if(data.sort) document.getElementById("sort").value = data.sort;
    if(data.search) document.getElementById("search").value = data.search;

  }catch(e){
    console.error("データ読み込み失敗", e);
  }
}

// =================
// 初期化
// =================
function init(){
  items = files.map(f=>{
    let name = f.replace(/\.[^/.]+$/, "").replace(/_\d+$/, "");
    let pointMatch = f.match(/_(\d+)\./);
    let point = pointMatch ? Number(pointMatch[1]) : 0;
    
    return {
      file:f,
      name:name,
      point:Number(point)
    };
  });

  loadData();
  render();

  document.getElementById("tab-"+filter).classList.add("active");

if(isInAppBrowser()){
  setTimeout(openBrowserModal, 500);
}
}

// =================
// 描画
// =================
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  let list=[...items];

  // ソート
  if(document.getElementById("sort").value==="name"){
    list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  }else{
    list.sort((a,b)=>a.point-b.point);
  }

  // フィルタ
  list=list.filter(i=>{
    if(filter==="small") return i.point<=99;
    if(filter==="big") return i.point>=100;
    return true;
  });

  // 検索
  const kw=document.getElementById("search").value;
  if(kw){
    list=list.filter(i=>i.name.includes(kw));
  }

  list.forEach(item=>{
    const div=document.createElement("div");
    div.className="cell";

    const img=document.createElement("img");
    img.src="gifts/"+item.file;

    const overlay=document.createElement("div");
    overlay.className="overlay";

    const count=state[item.file]||0;
    if(count>0){
      overlay.innerText=count;
    }else{
      overlay.style.display="none";
    }

    // 左クリック
    div.onclick=()=>{
   saveUndo();
   state[item.file]=(state[item.file]||0)+1;

  updateCell(div, item.file);
  saveData();
};

    // 右クリック（減算）
    div.oncontextmenu=(e)=>{
  e.preventDefault();
  if((state[item.file]||0)>0){
    saveUndo();
    state[item.file]--;

    updateCell(div, item.file);
    saveData();
  }
};

    div.appendChild(img);
    div.appendChild(overlay);
    grid.appendChild(div);
  });

}

// =================
// Undo / Redo
// =================
function saveUndo(){
  undoStack.push(JSON.stringify(state));
  redoStack=[];
}

function undo(){
  if(!undoStack.length) return;
  redoStack.push(JSON.stringify(state));
  state=JSON.parse(undoStack.pop());
  render();
}

function redo(){
  if(!redoStack.length) return;
  undoStack.push(JSON.stringify(state));
  state=JSON.parse(redoStack.pop());
  render();
}

// =================
// リセット
// =================
function resetAll(){
  openModal();
}

// =================
// フィルタ
// =================
function setFilter(f){
  filter = f;

  // 全部のボタンからactiveを消す
  document.querySelectorAll(".tabs button").forEach(b=>{
    b.classList.remove("active");
  });

  // 選んだボタンだけactive
  document.getElementById("tab-"+f).classList.add("active");

  render();
}

// =================
init();

function updateCell(div, file){
  let overlay = div.querySelector(".overlay");
  let count = state[file] || 0;

  if(count > 0){
    overlay.innerText = count;
    overlay.style.display = "flex";
  }else{
    overlay.style.display = "none";
  }
}

function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function confirmReset(){
  saveUndo();
  state={};
  closeModal();
  render();
}

function generateProgressImage(){
  const cols = 20;
  const size = 40;
  const padding = 10;

  const list = items;
  const rows = Math.ceil(list.length / cols);


/* =====================
   周回数を計算
===================== */
const counts = list.map(item => state[item.file] || 0);
const loopCount = counts.length ? Math.min(...counts) : 0;

/* 下に文字を描く余白 */
const footerHeight = 50;

const canvas = document.createElement("canvas");
canvas.width = cols * size + padding * 2;
canvas.height = rows * size + padding * 2 + footerHeight;

  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let loaded = 0;

  return new Promise(resolve=>{
    if(list.length === 0){
      resolve(canvas.toDataURL("image/png"));
      return;
    }

    list.forEach((item, index)=>{
      const count = state[item.file] || 0;

      const x = index % cols;
      const y = Math.floor(index / cols);

      const img = new Image();
      img.src = "gifts/" + item.file;

      img.onload = ()=>{
        ctx.drawImage(img, padding + x*size, padding + y*size, size, size);

 if(count > 0){
  const drawX = padding + x*size;
  const drawY = padding + y*size;

  // ① 半透明の黒で暗くする
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(drawX, drawY, size, size);

  // ② 中央に大きい数字
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 16px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.fillText(
    count,
    drawX + size/2,
    drawY + size/2
  );
}

loaded++;


if(loaded === list.length){

  /* =====================
     周回数テキスト
  ===================== */

  ctx.fillStyle = "#ff6fa5";
  ctx.font = "bold 24px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.fillText(
    `周回数：${loopCount}`,
    canvas.width / 2,
    canvas.height - footerHeight / 2
  );

  resolve(canvas.toDataURL("image/png"));
}
      };
    });
  });
}

async function shareProgress(){
  const dataUrl = await generateProgressImage();

  // 画像ダウンロード
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = "progress.png";
  a.click();

  // 投稿画面を開く
  const text = encodeURIComponent("しんちょく！");
  window.open(`https://twitter.com/intent/tweet?text=${text}`, "_blank");
}

function isInAppBrowser(){
  const ua = navigator.userAgent || "";
  return /Twitter/.test(ua); // Xアプリ内ブラウザ検知
}

function openBrowserModal(){
  document.getElementById("browserModal").style.display = "flex";
}

function closeBrowserModal(){
  document.getElementById("browserModal").style.display = "none";
}

</script>

  <div class="modal-box">
    <p>全部リセットする？</p>
    <button onclick="closeModal()">キャンセル</button>
    <button onclick="confirmReset()">リセット</button>
  </div>
</div>

  <div class="modal-box">
    <p>
      ブラウザーでひらいてね！<br>
      （Chrome・Safariなど）
    </p>
    <button onclick="closeBrowserModal()">わかった！</button>
  </div>
</div>
