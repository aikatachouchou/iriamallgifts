<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全ギフたいきゅう！</title>

<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&display=swap" rel="stylesheet">

<style>
:root{
  --main-pink:#ffb7c5;
  --sub-pink:#ff8fb1;
  --bg:#fffaf0;
  --card:#ffffff;
  --border:#ffecb3;
  --text:#7d5a50;
}

body{
  margin:0;
  font-family:'Kiwi Maru',serif;
  background:var(--bg);
  text-align:center;
  padding:10px;
  color:var(--text);
}

h1{
  color:var(--sub-pink);
  margin:5px;
}

/* コントロール */
.controls{
  margin-bottom:10px;
}

button, select, input{
  padding:6px 10px;
  border-radius:12px;
  border:2px solid var(--border);
  background:white;
  margin:3px;
  cursor:pointer;
  box-shadow:0 3px 0 var(--border);
}

button:active{
  transform:translateY(2px);
  box-shadow:0 1px 0 var(--border);
}

/* タブ */
.tabs button{
  font-weight:bold;
}

/* 白いカード */
.table-container{
  background:var(--card);
  border-radius:20px;
  padding:12px;
  margin:10px auto;
  max-width:820px;
  border:4px solid var(--border);
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* グリッド */
.grid{
  display:grid;
  grid-template-columns: repeat(10, 72px);
  gap:8px;
  justify-content:center;
}

/* マス */
.cell{
  width:72px;
  height:72px;
  position:relative;
  border-radius:12px;
  overflow:hidden;
  background:white;
  border:2px solid #ffe4ec;
  cursor:pointer;
  transition:0.15s;
}

.cell:hover{
  transform:scale(1.05);
}

.cell img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* カウント表示 */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
  color:white;
  font-size:20px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* スマホ */
@media(max-width:800px){
  .grid{
    grid-template-columns: repeat(5, 72px);
  }
}
.credit{
  margin-top:15px;
  font-size:14px;
  opacity:0.8;
  padding-bottom:20px;
}

.credit a{
  color:var(--sub-pink);
  text-decoration:none;
  font-weight:bold;
}

.credit a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<h1>全ギフたいきゅう！</h1>

<div class="controls">
  <button onclick="undo()">もどす</button>
  <button onclick="redo()">すすむ</button>
  <button onclick="resetAll()">りせっと</button>

  <br>

  <select id="sort" onchange="render()">
    <option value="name">名前順</option>
    <option value="point">ポイント順</option>
  </select>

  <input id="search" placeholder="検索..." oninput="render()">

  <div class="tabs">
    <button onclick="setFilter('all')">全体</button>
    <button onclick="setFilter('small')">プチギフ</button>
    <button onclick="setFilter('big')">デカギフ</button>
  </div>
</div>

<div class="table-container">
  <div id="grid" class="grid"></div>
</div>

<script>
let items = [];
let state = {};
let undoStack = [];
let redoStack = [];
let filter = "all";

// =================
// ファイル一覧（ここを書くだけ）
// =================
const files = [
  // ここに追加
  // "いぬ_50.png",
  // "ねこ_120.png"
];

// =================
// 初期化
// =================
function init(){
  items = files.map(f=>{
    let [name, point] = f.replace(".png","").split("_");
    return {
      file:f,
      name:name,
      point:Number(point)
    };
  });
  render();
}

// =================
// 描画
// =================
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  let list=[...items];

  // ソート
  if(document.getElementById("sort").value==="name"){
    list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  }else{
    list.sort((a,b)=>a.point-b.point);
  }

  // フィルタ
  list=list.filter(i=>{
    if(filter==="small") return i.point<=99;
    if(filter==="big") return i.point>=100;
    return true;
  });

  // 検索
  const kw=document.getElementById("search").value;
  if(kw){
    list=list.filter(i=>i.name.includes(kw));
  }

  list.forEach(item=>{
    const div=document.createElement("div");
    div.className="cell";

    const img=document.createElement("img");
    img.src="gifts/"+item.file;

    const overlay=document.createElement("div");
    overlay.className="overlay";

    const count=state[item.file]||0;
    if(count>0){
      overlay.innerText=count;
    }else{
      overlay.style.display="none";
    }

    div.onclick=()=>{
      saveUndo();
      state[item.file]=(state[item.file]||0)+1;
      render();
    };

    div.oncontextmenu=(e)=>{
      e.preventDefault();
      if((state[item.file]||0)>0){
        saveUndo();
        state[item.file]--;
        render();
      }
    };

    div.appendChild(img);
    div.appendChild(overlay);
    grid.appendChild(div);
  });
}

// =================
// Undo / Redo
// =================
function saveUndo(){
  undoStack.push(JSON.stringify(state));
  redoStack=[];
}

function undo(){
  if(!undoStack.length) return;
  redoStack.push(JSON.stringify(state));
  state=JSON.parse(undoStack.pop());
  render();
}

function redo(){
  if(!redoStack.length) return;
  undoStack.push(JSON.stringify(state));
  state=JSON.parse(redoStack.pop());
  render();
}

// =================
// リセット
// =================
function resetAll(){
  if(!confirm("全部リセットする？")) return;
  saveUndo();
  state={};
  render();
}

// =================
// フィルタ
// =================
function setFilter(f){
  filter=f;
  render();
}

// =================
init();
</script>

<div class="credit">
  <a href="https://x.com/momochou_md?s=20" target="_blank">
    for @momochou_md
  </a>
</div>

</body>
</html>
